name: Deploy to Cloudflare Pages (TEST)

on:
  push:
    branches:
      - TEST

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vasi-web/package-lock.json

      - name: Install dependencies
        working-directory: vasi-web
        run: npm ci

      - name: Build (Cloudflare Pages)
        working-directory: vasi-web
        run: npx @cloudflare/next-on-pages

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=vasiapp --branch=TEST
          workingDirectory: vasi-web
